name: "Tests"

on:
  push:
    branches:
      - "**"
jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26"
        cache-dependency-path: go.sum

    - name: Test root module
      run: go test -v ./...
